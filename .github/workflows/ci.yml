name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Opt into Node 24 now (GH forces it 2026-06-16); silences the Node 20 deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (real bugs only — warning+)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -S warning scripts/*.sh tests/*.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools (pandoc + matplotlib; mermaid best-effort)
        run: |
          python -m pip install --quiet matplotlib numpy
          sudo apt-get install -y pandoc
          npm install -g @mermaid-js/mermaid-cli || echo "mermaid-cli unavailable — render-figures will skip .mmd gracefully"

      - name: figlib imports + palette loads
        run: |
          python -c "import sys; sys.path.insert(0,'scripts'); import figlib; assert len(figlib.PALETTE)==5; print('figlib ok:', figlib.PALETTE)"

      - name: Unit harness (23 checks)
        run: bash tests/harness.sh

      - name: E2E pipeline smoke (scaffold -> render -> export -> reconcile)
        run: bash tests/e2e-smoke.sh
